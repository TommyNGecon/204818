<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>動物進化 2048 - 森林之王</title>
    <meta name="theme-color" content="#2d5a27">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="game-page">
    <div class="rotate-overlay" aria-hidden="true">
        <div class="rotate-overlay-content">請將手機轉為直向以繼續遊玩</div>
    </div>
    <div class="game-viewport">
    <div class="game-container">
        <header>
            <div class="title-section">
                <div class="info-bar">
                    <div class="score-box">
                        <span class="label">最高級</span>
                        <span id="best-animal">🐣</span>
                    </div>
                    <div class="score-box">
                        <span class="label">得分</span>
                        <span id="current-score">0</span>
                    </div>
                </div>
            </div>
            <div class="controls-top">

                <button id="restart-btn" class="restart-btn">重新開始</button>
                <div class="tool-box">
                    <button id="magic-wand-btn" class="tool-btn wand" title="魔法棒：點擊後可選擇棋盤上任何動物消除">
                        <span id="magic-wand-count" class="badge">2</span>
                    </button>
                    <button id="switch-tool-btn" class="tool-btn switch" title="交換工具：點擊後選擇兩個相鄰動物交換">
                        <span id="switch-tool-count" class="badge">1</span>
                    </button>
                </div>
                <button id="settings-btn" class="tool-btn settings-btn">⚙️</button>
            </div>
        </header>

        <div id="game-board" class="game-board">
            <!-- 4x4 grid will be generated by JS -->
        </div>

        <section class="encyclopedia-section">
            <div class="encyclopedia-header" id="encyclopedia-toggle" onclick="void(0)">
                <h2>🐾 動物百科圖鑑</h2>
                <span class="toggle-icon">▼</span>
            </div>
            <div id="encyclopedia-container" class="encyclopedia-container collapsed">
                <div id="encyclopedia" class="encyclopedia-grid">
                    <!-- Animal icons will be generated here -->
                </div>
            </div>
        </section>
    </div>
    </div>

    <!-- Win Celebration Overlay -->
    <div id="win-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>🏆 森林之王誕生！ 🏆</h2>
            <div class="celebration-emoji">🐉</div>
            <p>恭喜你成功進化為傳說中的巨龍！</p>
            <button id="continue-btn">繼續冒險</button>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>🌲 森林歸於平靜 🌲</h2>
            <p>遊戲結束，下次再努力進化吧！</p>
            <button id="retry-btn">再試一次</button>
            <a href="index.html" class="back-to-lobby-btn">返回大廳</a>
        </div>
    </div>

    <!-- Singularity Overlay -->
    <div id="singularity-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>✨ 宇宙的奇點 ✨</h2>
            <div class="celebration-emoji">✨</div>
            <p>萬物歸一，進化已達終點。恭喜你見證了宇宙的奧秘！</p>
            <button id="restart-singularity-btn">開啟新輪迴</button>
        </div>
    </div>

    <!-- Ultimate Win Overlay -->
    <div id="ultimate-win-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>🎇 宇宙的創造者 🎇</h2>
            <div class="celebration-emoji">🎇</div>
            <p>恭喜！您已達到進化的最終形態，成為了新宇宙的創造者！</p>
            <button id="restart-ultimate-btn">再次創造世界</button>
        </div>
    </div>

    <!-- Expansion Overlay -->
    <div id="expansion-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>🌍 空間擴張！ 🌍</h2>
            <div class="celebration-emoji">🌱</div>
            <p id="expansion-message">森林變得更開闊了，可以容納更多生命！</p>
            <button id="expansion-continue-btn">繼續進化</button>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-overlay" class="overlay hidden">
        <div class="overlay-content settings-content">
            <h2>⚙️ 遊戲設定</h2>
            <div class="settings-group">
                <div class="setting-item">
                    <span>音效</span>
                    <label class="switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>動畫效果</span>
                    <label class="switch">
                        <input type="checkbox" id="animation-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
            <div class="settings-actions">
                <button id="reset-current-game-btn" class="secondary-btn">重置當局進度</button>
                <button id="back-to-lobby-btn" class="secondary-btn" type="button">返回大厅</button>
                <button id="reset-progress-btn" class="danger-btn">重置所有進度</button>
                <button id="close-settings-btn" class="primary-btn">關閉</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
